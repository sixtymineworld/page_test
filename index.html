<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />

</head>

<body>
    <div class="test">
        <h1>Hello World!</h1>
        <!-- Slider main container -->
        <div class="swiper">
            <!-- Additional required wrapper -->
            <div class="swiper-wrapper">
                <!-- Slides -->
                <div class="swiper-slide"><img src="https://cdn.pixabay.com/photo/2026/02/24/17/17/17-17-00-773_1280.jpg" alt=""></div>
                <div class="swiper-slide"><img src="https://cdn.pixabay.com/photo/2026/04/02/14/46/14-46-40-173_1280.jpg" alt=""></div>
                <div class="swiper-slide"><img src="https://cdn.pixabay.com/photo/2025/12/23/11/27/mountain-10030954_1280.jpg" alt=""></div>
                <div class="swiper-slide"><img src="https://cdn.pixabay.com/photo/2026/04/02/14/46/14-46-40-173_1280.jpg" alt=""></div>
                

            </div>
            <!-- If we need pagination -->
            <div class="swiper-pagination"></div>

            <!-- If we need navigation buttons -->
            <div class="swiper-button-prev"></div>
            <div class="swiper-button-next"></div>

            <!-- If we need scrollbar -->
            <div class="swiper-scrollbar"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
<script>

            const swiper = new Swiper('.swiper', {
           
            loop: true,
             autoplay: {
              delay: 3000,
             },
            slidesPerView: 1,
            spaceBetween: 10,
            breakpoints: {

             565: {
                 slidesPerView: 3,
                  spaceBetween: 30
    },
    // when window width is >= 1024px
             1024: {
                 slidesPerView: 4,
                 spaceBetween: 40
    }
  },

            // If we need pagination
            pagination: {
                el: '.swiper-pagination',
            },

            // Navigation arrows
            navigation: {
                nextEl: '.swiper-button-next',
                prevEl: '.swiper-button-prev',
            },

          
        });
</script>
</body>

</html>
